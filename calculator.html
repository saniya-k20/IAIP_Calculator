<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALC — Minimal Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2efe8;
    --paper: #faf8f3;
    --ink: #1a1814;
    --ink-muted: rgba(26,24,20,0.35);
    --ink-faint: rgba(26,24,20,0.08);
    --accent: #d4522a;
    --accent-pale: rgba(212,82,42,0.08);
    --op-bg: #1a1814;
    --op-text: #f2efe8;
    --shadow: rgba(26,24,20,0.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  /* Decorative lines */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Brand */
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--ink-muted);
    text-transform: uppercase;
  }

  .brand-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* Calculator body */
  .calc {
    background: var(--paper);
    border-radius: 24px;
    padding: 24px;
    width: 340px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 20px 60px var(--shadow),
      0 4px 12px rgba(26,24,20,0.06);
    border: 1px solid rgba(26,24,20,0.06);
  }

  /* Display */
  .display {
    background: var(--bg);
    border-radius: 14px;
    padding: 20px 20px 16px;
    margin-bottom: 20px;
    border: 1px solid var(--ink-faint);
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    position: relative;
    overflow: hidden;
  }

  .display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.9);
  }

  .display-expr {
    font-size: 13px;
    color: var(--ink-muted);
    font-weight: 300;
    letter-spacing: 0.05em;
    min-height: 18px;
    margin-bottom: 6px;
    word-break: break-all;
    text-align: right;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .display-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: 0.02em;
    word-break: break-all;
    text-align: right;
    max-width: 100%;
    overflow: hidden;
    transition: font-size 0.1s;
  }

  .display-main.small { font-size: 36px; }
  .display-main.xsmall { font-size: 26px; }

  /* Button grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  /* Buttons */
  button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 400;
    border: none;
    border-radius: 12px;
    height: 64px;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s, background 0.12s;
    position: relative;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  button:active {
    transform: scale(0.94);
  }

  /* Number buttons */
  .btn-num {
    background: var(--paper);
    color: var(--ink);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 2px 0 rgba(26,24,20,0.08),
      0 1px 4px rgba(26,24,20,0.06);
    border: 1px solid rgba(26,24,20,0.07);
    font-size: 18px;
    font-weight: 500;
  }

  .btn-num:hover {
    background: #fff;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 3px 0 rgba(26,24,20,0.1),
      0 2px 8px rgba(26,24,20,0.08);
  }

  /* Zero spans 2 cols */
  .btn-zero {
    grid-column: span 2;
    text-align: left;
    padding-left: 26px;
  }

  /* Operator buttons */
  .btn-op {
    background: var(--op-bg);
    color: var(--op-text);
    font-size: 20px;
    box-shadow:
      0 2px 0 rgba(0,0,0,0.3),
      0 1px 6px rgba(0,0,0,0.2);
  }

  .btn-op:hover {
    background: #2d2b26;
    box-shadow:
      0 3px 0 rgba(0,0,0,0.35),
      0 2px 10px rgba(0,0,0,0.25);
  }

  /* Accent buttons (= and C) */
  .btn-accent {
    background: var(--accent);
    color: #fff;
    font-size: 22px;
    font-weight: 500;
    box-shadow:
      0 2px 0 rgba(160,50,20,0.5),
      0 1px 8px rgba(212,82,42,0.25);
    letter-spacing: 0.01em;
  }

  .btn-accent:hover {
    background: #c04520;
    box-shadow:
      0 3px 0 rgba(140,40,15,0.5),
      0 2px 12px rgba(212,82,42,0.35);
  }

  /* Function buttons (AC, +/-, %) */
  .btn-fn {
    background: rgba(26,24,20,0.06);
    color: var(--ink);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.04em;
    border: 1px solid rgba(26,24,20,0.05);
  }

  .btn-fn:hover {
    background: rgba(26,24,20,0.1);
  }

  /* Equals spans full height visually */
  .btn-equals {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.05em;
  }

  /* Press ripple */
  button::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }

  button:active::after {
    background: rgba(255,255,255,0.12);
  }

  /* Footer */
  .footer {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* Error state */
  .display-main.error { color: var(--accent); font-size: 28px; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">Calculator</span>
    <div class="brand-dot"></div>
  </div>

  <div class="calc">
    <div class="display">
      <div class="display-expr" id="expr"></div>
      <div class="display-main" id="main">0</div>
    </div>

    <div class="grid">
      <!-- Row 1 -->
      <button class="btn-fn" onclick="clearAll()">AC</button>
      <button class="btn-fn" onclick="toggleSign()">+/−</button>
      <button class="btn-fn" onclick="percent()">%</button>
      <button class="btn-op" onclick="setOp('÷')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="inputDigit('7')">7</button>
      <button class="btn-num" onclick="inputDigit('8')">8</button>
      <button class="btn-num" onclick="inputDigit('9')">9</button>
      <button class="btn-op" onclick="setOp('×')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="inputDigit('4')">4</button>
      <button class="btn-num" onclick="inputDigit('5')">5</button>
      <button class="btn-num" onclick="inputDigit('6')">6</button>
      <button class="btn-op" onclick="setOp('−')">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="inputDigit('1')">1</button>
      <button class="btn-num" onclick="inputDigit('2')">2</button>
      <button class="btn-num" onclick="inputDigit('3')">3</button>
      <button class="btn-op" onclick="setOp('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-num btn-zero" onclick="inputDigit('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-accent btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <div class="footer"></div>
</div>

<script>
  let current = '0';
  let previous = null;
  let operator = null;
  let shouldReset = false;
  let exprStr = '';

  const mainEl = document.getElementById('main');
  const exprEl = document.getElementById('expr');

  function updateDisplay(val) {
    let s = String(val);
    mainEl.classList.remove('small', 'xsmall', 'error');
    if (s.length > 12) s = parseFloat(val).toExponential(4);
    if (s.length > 10) mainEl.classList.add('xsmall');
    else if (s.length > 7) mainEl.classList.add('small');
    mainEl.textContent = s;
    exprEl.textContent = exprStr;
  }

  function inputDigit(d) {
    if (shouldReset) { current = d; shouldReset = false; }
    else current = current === '0' ? d : current + d;
    if (current.length > 15) return;
    updateDisplay(current);
  }

  function inputDot() {
    if (shouldReset) { current = '0.'; shouldReset = false; updateDisplay(current); return; }
    if (!current.includes('.')) current += '.';
    updateDisplay(current);
  }

  function setOp(op) {
    if (operator && !shouldReset) calculate(true);
    previous = parseFloat(current);
    operator = op;
    shouldReset = true;
    exprStr = previous + ' ' + op;
    updateDisplay(current);
  }

  function calculate(chained) {
    if (operator === null || previous === null) return;
    const cur = parseFloat(current);
    let result;
    switch (operator) {
      case '+': result = previous + cur; break;
      case '−': result = previous - cur; break;
      case '×': result = previous * cur; break;
      case '÷':
        if (cur === 0) { showError(); return; }
        result = previous / cur;
        break;
    }
    if (!chained) {
      exprStr = previous + ' ' + operator + ' ' + cur + ' =';
    }
    result = parseFloat(result.toPrecision(12));
    current = String(result);
    if (!chained) { operator = null; previous = null; }
    shouldReset = true;
    updateDisplay(result);
  }

  function clearAll() {
    current = '0'; previous = null; operator = null;
    shouldReset = false; exprStr = '';
    mainEl.classList.remove('error');
    updateDisplay('0');
  }

  function toggleSign() {
    current = String(parseFloat(current) * -1);
    updateDisplay(current);
  }

  function percent() {
    current = String(parseFloat(current) / 100);
    updateDisplay(current);
  }

  function showError() {
    mainEl.textContent = 'Can\'t ÷ by 0';
    mainEl.classList.add('error');
    exprStr = '';
    exprEl.textContent = '';
    current = '0'; previous = null; operator = null; shouldReset = true;
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('−');
    else if (e.key === '*') setOp('×');
    else if (e.key === '/') { e.preventDefault(); setOp('÷'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
    else if (e.key === 'Backspace') {
      if (shouldReset) return;
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay(current);
    }
  });
</script>
</body>
</html>
